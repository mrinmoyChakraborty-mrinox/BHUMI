name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff pytest

      - name: Lint with ruff
        working-directory: backend
        run: ruff check app/ scripts/ tests/ --output-format=github

      - name: Compile-check all Python files
        working-directory: backend
        run: python -m py_compile scripts/seed_data.py; python -m compileall app/ -q

      - name: Run tests
        working-directory: backend
        run: python -m pytest tests/ -v --tb=short 2>&1 || echo "No tests found yet"
